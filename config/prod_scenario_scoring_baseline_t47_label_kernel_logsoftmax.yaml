backends:
  gpu:
    cost_per_hour: 2.2
    default_server_args:
    - python3
    - -m
    - sglang.launch_server
    - --model-path
    - Qwen/Qwen3-0.6B
    - --host
    - 0.0.0.0
    - --port
    - '30000'
    hardware: NVIDIA RTX Pro 6000
    name: PyTorch/GPU (sglang main)
  tpu:
    cost_per_hour: 1.25
    hardware: TPU v6e-1
    name: JAX/TPU scoring API
    repo_path: /home/kanna/work/sglang-jax-pr27-prof
    url: http://127.0.0.1:30001
benchmark:
  concurrency: 1
  request_retry_attempts: 3
  request_retry_backoff_sec: 0.25
  timed_requests: 10
  timeout_sec: 300
  warmup_requests: 3
experiment:
  api_endpoint: /v1/score
  model: Qwen/Qwen3-0.6B
metadata:
  description: 'T47 variant: label-only kernel mode=log_softmax on top of T46 selected
    adaptive settings.'
  name: prod_scenario_scoring_baseline_t47_label_kernel_logsoftmax
  source_contract: config/prod_scenarios_contract.yaml
  version: 1
reproducibility:
  profile_order:
  - track_low
  - track_mean
  - track_high
  - home_low
  - home_mean
  - home_high
  random_seed: 20260301
tpu_matrix:
  align_items_per_step_with_workloads: true
  allow_score_full_vocab_fallback: false
  auto_bump_lane_capacity_with_workload: false
  gate_max_p99_p50:
    home_high: 4.0
    home_low: 5.0
    home_mean: 4.5
    track_high: 4.0
    track_low: 5.0
    track_mean: 4.5
  items_per_step_candidates:
  - 96
  lane_capacity_bump_cap: 128
  max_running_requests: 96
  multi_item_extend_batch_size: 64
  multi_item_scoring_chunk_size: 256
  precompile_bs_paddings:
  - 24
  - 64
  - 96
  precompile_token_paddings:
  - 1024
  - 2048
  - 4096
  - 8192
  - 16384
  - 32768
  require_cache_transition_exercise: false
  shape_contract:
    enabled: true
    item_fill_token_id: 84
    item_token_buckets:
    - 26
    - 30
    - 50
    - 55
    - 63
    - 70
    - 80
    - 100
    num_items_buckets:
    - 1
    - 8
    - 16
    - 34
    - 96
    - 128
    - 256
    pad_token_id: 0
    query_fill_token_id: 42
    query_token_buckets:
    - 155
    - 183
    - 275
    - 420
    - 483
    - 1024
    - 2048
    - 2375
    strict: true
    use_token_ids: true
  stabilization_sleep_sec: 8.0
  warmup_all_shape_buckets: true
  warmup_max_shape_bucket_requests: 64
  workload_warmup_attempts: 5
  workload_warmup_backoff_sec: 2.0
tpu_server:
  env:
    MULTI_ITEM_DISABLE_OVERLAP_SCHEDULE: '1'
    MULTI_ITEM_ENABLE_SCORE_FROM_CACHE_V2: '1'
    MULTI_ITEM_MASK_IMPL: dense
    MULTI_ITEM_SCORE_FASTPATH_LOG_METRICS: '1'
    MULTI_ITEM_SCORE_LABEL_ONLY_LOGPROB: '1'
    MULTI_ITEM_SEGMENT_FALLBACK_THRESHOLD: '0'
    SGLANG_RPA_KERNEL_V11: '1'
    SGLANG_SCORE_FROM_CACHE_V2_ALLOW_REQPOOL_OVERSUBSCRIBE: '1'
    SGLANG_SCORE_LABEL_ONLY_KERNEL_MODE: log_softmax
  static_args:
  - --trust-remote-code
  - --host
  - 0.0.0.0
  - --device
  - tpu
  - --dtype
  - bfloat16
  - --tp-size
  - '1'
  - --mem-fraction-static
  - '0.7'
  - --max-prefill-tokens
  - '32768'
  - --chunked-prefill-size
  - '-1'
  - --disable-overlap-schedule
  - --attention-backend
  - fa
  - --page-size
  - '64'
  - --multi-item-scoring-delimiter
  - '151643'
  - --max-multi-item-seq-len
  - '32768'
  - --max-multi-item-count
  - '1024'
  - --multi-item-mask-impl
  - dense
  - --multi-item-segment-fallback-threshold
  - '0'
  - --multi-item-enable-prefill-extend
  - --multi-item-enable-score-from-cache-v2
  - --multi-item-score-label-only-logprob
  - --multi-item-score-fastpath-log-metrics
  - --enable-scoring-cache
  - --skip-server-warmup
  - --log-level
  - info
  - --multi-item-score-from-cache-v2-adaptive-chunk-by-token-budget
  - --multi-item-score-from-cache-v2-token-budget
  - '50000'
  - --multi-item-score-from-cache-v2-min-items-per-step
  - '48'
workloads:
- apply_softmax: false
  item_tokens: 26
  label_token_ids:
  - 198
  name: track_low
  num_items: 16
  profile: low
  query_tokens: 183
  scenario: track_scoring
  total_tokens_expected: 599
- apply_softmax: false
  item_tokens: 55
  label_token_ids:
  - 198
  name: track_mean
  num_items: 96
  profile: mean
  query_tokens: 420
  scenario: track_scoring
  total_tokens_expected: 5700
- apply_softmax: false
  item_tokens: 63
  label_token_ids:
  - 198
  name: track_high
  num_items: 128
  profile: high
  query_tokens: 483
  scenario: track_scoring
  total_tokens_expected: 8547
- apply_softmax: false
  item_tokens: 30
  label_token_ids:
  - 198
  name: home_low
  num_items: 8
  profile: low
  query_tokens: 155
  scenario: home_scoring
  total_tokens_expected: 395
- apply_softmax: false
  item_tokens: 50
  label_token_ids:
  - 198
  name: home_mean
  num_items: 34
  profile: mean
  query_tokens: 275
  scenario: home_scoring
  total_tokens_expected: 1975
- apply_softmax: false
  item_tokens: 70
  label_token_ids:
  - 198
  name: home_high
  num_items: 256
  profile: high
  query_tokens: 2375
  scenario: home_scoring
  total_tokens_expected: 20295
